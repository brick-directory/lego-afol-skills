name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to publish, for example 1.2.3'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing AFOL skills version $VERSION"

      - name: Run validation
        run: |
          python3 -m unittest discover -s tests -p 'test_*.py'
          scripts/validate-skills.sh
          git diff --check

      - name: Build per-skill release bundles
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_WORK="${RUNNER_TEMP}/afol-skill-release"
          rm -rf "$RELEASE_WORK" dist
          mkdir -p "$RELEASE_WORK" dist

          for skill_dir in skills/*; do
            [[ -d "$skill_dir" ]] || continue
            skill="$(basename "$skill_dir")"
            work_dir="$RELEASE_WORK/$skill"
            mkdir -p "$work_dir"
            cp -a "$skill_dir/." "$work_dir/"

            python3 - "$work_dir/SKILL.md" "$VERSION" <<'PY'
          import pathlib
          import re
          import sys

          path = pathlib.Path(sys.argv[1])
          version = sys.argv[2]
          text = path.read_text()
          updated = re.sub(r'(?m)^version:\s*.*$', f'version: {version}', text, count=1)
          if updated == text:
              raise SystemExit(f'No version field found in {path}')
          path.write_text(updated)
          PY

            (cd "$work_dir" && zip -qr "$GITHUB_WORKSPACE/dist/${skill}.zip" . \
              -x "./.git/*" \
              -x "*/__pycache__/*" \
              -x "*.pyc" \
              -x "./.DS_Store")
          done

          echo "Built bundles:"
          unzip -l dist/afol.zip | head -20
          du -h dist/*.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AFOL skills ${{ steps.version.outputs.version }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          body: |
            AFOL skills v${{ steps.version.outputs.version }}

            This release publishes each skill as its own archive and ClawHub skill:
            - `afol`
            - `brickeconomy`
            - `bricklink`
            - `brickowl`
            - `brickset`
            - `rebrickable`

            **Install from ClawHub / OpenClaw:**
            ```bash
            npx clawhub@latest install afol
            npx clawhub@latest install brickeconomy
            npx clawhub@latest install bricklink
            npx clawhub@latest install brickowl
            npx clawhub@latest install brickset
            npx clawhub@latest install rebrickable
            ```

            **Install with Hermes from GitHub:**
            ```bash
            hermes skills install github/${{ github.repository }}/skills/afol
            hermes skills install github/${{ github.repository }}/skills/brickeconomy
            hermes skills install github/${{ github.repository }}/skills/bricklink
            hermes skills install github/${{ github.repository }}/skills/brickowl
            hermes skills install github/${{ github.repository }}/skills/brickset
            hermes skills install github/${{ github.repository }}/skills/rebrickable
            ```
          files: |
            dist/*.zip

      - name: Publish each skill to ClawHub
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_WORK="${RUNNER_TEMP}/afol-skill-release"

          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "CLAWHUB_TOKEN secret is required to publish to ClawHub" >&2
            exit 1
          fi

          npm i -g clawhub
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

          display_name() {
            case "$1" in
              afol) echo "AFOL" ;;
              brickeconomy) echo "BrickEconomy" ;;
              bricklink) echo "BrickLink" ;;
              brickowl) echo "BrickOwl" ;;
              brickset) echo "Brickset" ;;
              rebrickable) echo "Rebrickable" ;;
              *) echo "$1" ;;
            esac
          }

          for work_dir in "$RELEASE_WORK"/*; do
            [[ -d "$work_dir" ]] || continue
            skill="$(basename "$work_dir")"
            name="$(display_name "$skill")"
            clawhub skill publish "$work_dir" \
              --slug "$skill" \
              --name "$name" \
              --version "$VERSION" \
              --changelog "Release ${GITHUB_REF_NAME:-v$VERSION}" \
              --tags "latest,afol,lego"
          done
