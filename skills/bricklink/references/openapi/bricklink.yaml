openapi: 3.0.3
info:
  title: BrickLink API
  description: Official BrickLink API for LEGO marketplace operations
  version: "1.0"
  contact:
    name: BrickLink API Support
    url: https://www.bricklink.com/v3/api.page
  license:
    name: BrickLink API Terms
    url: https://www.bricklink.com/v3/terms_of_use_api.page

servers:
  - url: https://api.bricklink.com/api/store/v1
    description: BrickLink API Production Server

security:
  - oauth1: []

paths:
  # ORDER ENDPOINTS
  /orders:
    get:
      tags:
        - Orders
      summary: Get orders
      description: Retrieves a list of orders you received or placed
      parameters:
        - name: direction
          in: query
          description: The direction of the order to get
          required: false
          schema:
            type: string
            enum: [in, out]
            default: in
        - name: status
          in: query
          description: The status of the order to include or exclude (comma-separated, use minus sign to exclude)
          required: false
          schema:
            type: string
        - name: filed
          in: query
          description: Indicates whether to retrieve filed or un-filed orders
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}:
    get:
      tags:
        - Orders
      summary: Get order
      description: Retrieves the details of a specific order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order to get
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Orders
      summary: Update order
      description: Updates properties of a specific order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/items:
    get:
      tags:
        - Orders
      summary: Get order items
      description: Retrieves a list of items for the specified order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/OrderItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/messages:
    get:
      tags:
        - Orders
      summary: Get order messages
      description: Retrieves a list of messages for the specified order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/OrderMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/feedback:
    get:
      tags:
        - Orders
      summary: Get order feedback
      description: Retrieves a list of feedback for the specified order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Feedback'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/status:
    put:
      tags:
        - Orders
      summary: Update order status
      description: Updates the status of a specific order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order to update status
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/payment_status:
    put:
      tags:
        - Orders
      summary: Update payment status
      description: Updates the payment status of a specific order
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order to update payment status
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentStatusUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{order_id}/drive_thru:
    post:
      tags:
        - Orders
      summary: Send drive thru
      description: Send "Thank You, Drive Thru!" e-mail to a buyer
      parameters:
        - name: order_id
          in: path
          required: true
          description: The ID of the order
          schema:
            type: integer
        - name: mail_me
          in: query
          required: false
          description: Indicates whether you want to cc yourself or not
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # STORE INVENTORY ENDPOINTS
  /inventories:
    get:
      tags:
        - Store Inventory
      summary: Get store inventories
      description: Retrieves a list of inventories you have
      parameters:
        - name: item_type
          in: query
          description: The type of the item to include or exclude (comma-separated, use minus sign to exclude)
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: The status of the inventory to include or exclude
          required: false
          schema:
            type: string
            enum: [Y, S, B, C, N, R]
        - name: category_id
          in: query
          description: The ID of the category to include or exclude
          required: false
          schema:
            type: integer
        - name: color_id
          in: query
          description: The ID of the color to include or exclude
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Inventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Store Inventory
      summary: Create store inventory/inventories
      description: Creates one or more new inventories with items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/InventoryCreate'
                - type: array
                  items:
                    $ref: '#/components/schemas/InventoryCreate'
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: '#/components/schemas/Inventory'
                          - type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /inventories/{inventory_id}:
    get:
      tags:
        - Store Inventory
      summary: Get store inventory
      description: Retrieves information about a specific inventory
      parameters:
        - name: inventory_id
          in: path
          required: true
          description: The ID of the inventory to get
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Inventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Store Inventory
      summary: Update store inventory
      description: Updates properties of the specified inventory
      parameters:
        - name: inventory_id
          in: path
          required: true
          description: The ID of the inventory to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Inventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Store Inventory
      summary: Delete store inventory
      description: Deletes the specified inventory
      parameters:
        - name: inventory_id
          in: path
          required: true
          description: The ID of the inventory to delete
          schema:
            type: integer
      responses:
        '204':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # CATALOG ITEM ENDPOINTS
  /items/{type}/{no}:
    get:
      tags:
        - Catalog Items
      summary: Get item
      description: Returns information about the specified item in BrickLink catalog
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item to get
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item to get
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /items/{type}/{no}/images/{color_id}:
    get:
      tags:
        - Catalog Items
      summary: Get item image
      description: Returns image URL of the specified item by colors
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item to get
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item to get
          schema:
            type: string
        - name: color_id
          in: path
          required: true
          description: The color ID
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ItemImage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /items/{type}/{no}/supersets:
    get:
      tags:
        - Catalog Items
      summary: Get supersets
      description: Returns a list of items that include the specified item
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item
          schema:
            type: string
        - name: color_id
          in: query
          required: false
          description: The color of the item
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SupersetEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /items/{type}/{no}/subsets:
    get:
      tags:
        - Catalog Items
      summary: Get subsets
      description: Returns a list of items that are included in the specified item
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item
          schema:
            type: string
        - name: color_id
          in: query
          required: false
          description: The color of the item (valid only for PART type)
          schema:
            type: integer
        - name: box
          in: query
          required: false
          description: Indicates whether the set includes the original box
          schema:
            type: boolean
        - name: instruction
          in: query
          required: false
          description: Indicates whether the set includes the original instruction
          schema:
            type: boolean
        - name: break_minifigs
          in: query
          required: false
          description: Indicates whether the result breaks down minifigs as parts
          schema:
            type: boolean
        - name: break_subsets
          in: query
          required: false
          description: Indicates whether the result breaks down sets in set
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SubsetEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /items/{type}/{no}/price:
    get:
      tags:
        - Catalog Items
      summary: Get price guide
      description: Returns the price statistics of the specified item in BrickLink catalog
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item
          schema:
            type: string
        - name: color_id
          in: query
          required: false
          description: The color of the item
          schema:
            type: integer
        - name: guide_type
          in: query
          required: false
          description: Indicates which statistics to be provided
          schema:
            type: string
            enum: [sold, stock]
            default: stock
        - name: new_or_used
          in: query
          required: false
          description: Indicates the condition of items included in the statistics
          schema:
            type: string
            enum: [N, U]
            default: N
        - name: country_code
          in: query
          required: false
          description: Only includes items in stores located in specified country
          schema:
            type: string
        - name: region
          in: query
          required: false
          description: Only includes items in stores located in specified region
          schema:
            type: string
            enum: [asia, africa, north_america, south_america, middle_east, europe, eu, oceania]
        - name: currency_code
          in: query
          required: false
          description: Returns price in the specified currency code
          schema:
            type: string
        - name: vat
          in: query
          required: false
          description: Indicates that price will include VAT
          schema:
            type: string
            enum: [N, Y, O]
            default: N
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PriceGuide'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /items/{type}/{no}/colors:
    get:
      tags:
        - Catalog Items
      summary: Get known colors
      description: Returns currently known colors of the item
      parameters:
        - name: type
          in: path
          required: true
          description: The type of the item
          schema:
            $ref: '#/components/schemas/ItemType'
        - name: "no"
          in: path
          required: true
          description: Identification number of the item
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/KnownColor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # FEEDBACK ENDPOINTS
  /feedback:
    get:
      tags:
        - Feedback
      summary: Get feedback list
      description: Gets a list of feedback you received or posted
      parameters:
        - name: direction
          in: query
          description: The direction of the feedback to get
          required: false
          schema:
            type: string
            enum: [in, out]
            default: in
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Feedback'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Feedback
      summary: Post feedback
      description: Posts a new feedback about the transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackCreate'
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Feedback'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /feedback/{feedback_id}:
    get:
      tags:
        - Feedback
      summary: Get feedback
      description: Gets a specified feedback
      parameters:
        - name: feedback_id
          in: path
          required: true
          description: The ID of the feedback to get
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Feedback'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /feedback/{feedback_id}/reply:
    post:
      tags:
        - Feedback
      summary: Reply feedback
      description: Creates a reply to the specified feedback you received
      parameters:
        - name: feedback_id
          in: path
          required: true
          description: The ID of the feedback to post a reply
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackReply'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
