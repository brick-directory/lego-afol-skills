components:
  securitySchemes:
    oauth1:
      type: http
      scheme: oauth
      description: OAuth 1.0 authentication with simplified flow

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ApiResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          description: Requested information

    Meta:
      type: object
      properties:
        code:
          type: string
          description: API result code (2xx if successful)
        message:
          type: string
          description: More granular information about the result
        description:
          type: string
          description: Detailed description about the result

    ErrorResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'

    ItemType:
      type: string
      enum:
        - MINIFIG
        - PART
        - SET
        - BOOK
        - GEAR
        - CATALOG
        - INSTRUCTION
        - UNSORTED_LOT
        - ORIGINAL_BOX

    # ORDER SCHEMAS
    Order:
      type: object
      properties:
        order_id:
          type: string
          description: Unique identifier for this order
        date_ordered:
          type: string
          format: date-time
          description: The time the order was created
        date_status_changed:
          type: string
          format: date-time
          description: The time the order status was last modified
        seller_name:
          type: string
          description: The username of the seller in BL
        store_name:
          type: string
          description: The store name displayed on BL store pages
        buyer_name:
          type: string
          description: The username of the buyer in BL
        buyer_email:
          type: string
          description: E-mail address of the buyer
        buyer_order_count:
          type: integer
          description: Total count of all orders placed by the buyer in the seller's store
        require_insurance:
          type: boolean
          description: Indicates whether the buyer requests insurance for this order
        status:
          type: string
          description: The status of an order
        is_invoiced:
          type: boolean
          description: Indicates whether the order invoiced
        is_filed:
          type: boolean
          description: Indicates whether the order is filed
        drive_thru_sent:
          type: boolean
          description: Indicates whether "Thank You, Drive Thru!" email has been sent
        salesTax_collected_by_bl:
          type: boolean
          description: Indicates if sales tax are collected by BL or not
        remarks:
          type: string
          description: User remarks for this order
        total_count:
          type: integer
          description: The total number of items included in this order
        unique_count:
          type: integer
          description: The unique number of items included in this order
        total_weight:
          type: string
          description: The total weight of the items ordered
        payment:
          $ref: '#/components/schemas/Payment'
        shipping:
          $ref: '#/components/schemas/Shipping'
        cost:
          $ref: '#/components/schemas/Cost'
        disp_cost:
          $ref: '#/components/schemas/Cost'

    Payment:
      type: object
      properties:
        method:
          type: string
          description: The payment method for this order
        currency_code:
          type: string
          description: Currency code of the payment
        date_paid:
          type: string
          format: date-time
          description: The time the buyer paid
        status:
          type: string
          description: Payment status

    Shipping:
      type: object
      properties:
        method:
          type: string
          description: Shipping method name
        method_id:
          type: string
          description: Shipping method ID
        tracking_no:
          type: string
          description: Tracking numbers for the shipping
        tracking_link:
          type: string
          description: URL for tracking the shipping
        date_shipped:
          type: string
          format: date-time
          description: Shipping date
        address:
          $ref: '#/components/schemas/Address'

    Address:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/PersonName'
        full:
          type: string
          description: The full address in not-well-formatted
        address1:
          type: string
          description: The first line of the address
        address2:
          type: string
          description: The second line of the address
        country_code:
          type: string
          description: The country code
        city:
          type: string
          description: The city
        state:
          type: string
          description: The state
        postal_code:
          type: string
          description: The postal code
        phone_number:
          type: string
          description: The buyer's phone number

    PersonName:
      type: object
      properties:
        full:
          type: string
          description: The full name of this person
        first:
          type: string
          description: The given name (first name) of this person
        last:
          type: string
          description: The family name (last name) of this person

    Cost:
      type: object
      properties:
        currency_code:
          type: string
          description: The currency code of the transaction
        subtotal:
          type: string
          description: The total price for the order exclusive of shipping and other costs
        grand_total:
          type: string
          description: The total price for the order inclusive of tax, shipping and other costs
        salesTax_collected_by_BL:
          type: string
          description: Sales tax collected by BL, if that applies
        final_total:
          type: string
          description: Grand total - Sales tax collected by BL
        etc1:
          type: string
          description: Extra charge for this order (tax, packing, etc.)
        etc2:
          type: string
          description: Extra charge for this order (tax, packing, etc.)
        insurance:
          type: string
          description: Insurance cost
        shipping:
          type: string
          description: Shipping cost
        credit:
          type: string
          description: Credit applied to this order
        coupon:
          type: string
          description: Amount of coupon discount
        vat_rate:
          type: string
          description: VAT percentage applied to this order
        vat_amount:
          type: string
          description: Total amount of VAT included in the grand_total price

    OrderItem:
      type: object
      properties:
        inventory_id:
          type: integer
          description: The ID of the store inventory that includes the item
        item:
          $ref: '#/components/schemas/ItemReference'
        color_id:
          type: integer
          description: The ID of the color of the item
        color_name:
          type: string
          description: Color name of the item
        quantity:
          type: integer
          description: The number of items purchased in this order
        new_or_used:
          type: string
          enum: [N, U]
          description: Indicates whether the item is new or used
        completeness:
          type: string
          enum: [C, B, S]
          description: Indicates whether the set is complete or incomplete
        unit_price:
          type: string
          description: The original price of this item per sale unit
        unit_price_final:
          type: string
          description: The unit price of this item after applying tiered pricing policy
        disp_unit_price:
          type: string
          description: The original price of this item per sale unit in display currency
        disp_unit_price_final:
          type: string
          description: The unit price of this item after applying tiered pricing policy in display currency
        currency_code:
          type: string
          description: The currency code of the price
        disp_currency_code:
          type: string
          description: The display currency code of the user
        remarks:
          type: string
          description: User remarks of the order item
        description:
          type: string
          description: User description of the order item
        weight:
          type: string
          description: The weight of the item that overrides the catalog weight

    ItemReference:
      type: object
      properties:
        "no":
          type: string
          description: Item's identification number in BL catalog
        name:
          type: string
          description: The name of the item
        type:
          $ref: '#/components/schemas/ItemType'
        category_id:
          type: integer
          description: The main category of the item

    OrderMessage:
      type: object
      properties:
        subject:
          type: string
          description: The subject of the message
        body:
          type: string
          description: The contents of the message
        from:
          type: string
          description: The username of who sends the message
        to:
          type: string
          description: The username of who receives the message
        dateSent:
          type: string
          format: date-time
          description: The time the message was sent

    OrderUpdate:
      type: object
      properties:
        shipping:
          type: object
          properties:
            date_shipped:
              type: string
              format: date-time
            tracking_no:
              type: string
            tracking_link:
              type: string
            method_id:
              type: integer
        cost:
          type: object
          properties:
            shipping:
              type: string
            insurance:
              type: string
            credit:
              type: string
            etc1:
              type: string
